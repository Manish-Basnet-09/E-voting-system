<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E-Voting System — Patan Multiple Campus</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0d1117;
    --ink2: #1a2332;
    --paper: #f5f0e8;
    --cream: #faf7f2;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #9a7a2e;
    --crimson: #b91c1c;
    --emerald: #065f46;
    --emerald-light: #10b981;
    --sky: #1e40af;
    --sky-light: #3b82f6;
    --muted: #6b7280;
    --border: #d1c9b8;
    --shadow: 0 4px 24px rgba(13,17,23,0.12);
    --shadow-lg: 0 12px 48px rgba(13,17,23,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LAYOUT ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── NAV ── */
  nav {
    background: var(--ink);
    border-bottom: 3px solid var(--gold);
    padding: 0 3rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 92px;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 16px;
  }
  .nav-logo {
    width: 50px; height: 50px;
    background: var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 22px; color: var(--ink);
  }
  .nav-title { color: #fff; font-size: 17px; font-weight: 600; }
  .nav-subtitle { color: var(--gold); font-size: 13px; font-weight: 400; }
  .nav-links { display: flex; align-items: center; gap: 14px; }
  .nav-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    padding: 10px 22px; border-radius: 6px;
    font-size: 15px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); }
  .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
  .nav-btn.danger { border-color: rgba(185,28,28,0.5); color: #f87171; }
  .nav-btn.danger:hover { background: rgba(185,28,28,0.2); }

  /* ── MAIN ── */
  main { flex: 1; }

  /* ── HERO / LANDING ── */
  .hero {
    background: var(--ink);
    min-height: calc(100vh - 64px);
    display: grid; grid-template-columns: 1fr 0.5fr;
    align-items: flex-start;
    padding: 2.5rem 3rem;
    gap: 1.2rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(201,168,76,0.08) 0%, transparent 60%);
  }
  .hero-text { position: relative; z-index: 1; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 6px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }
  .hero-badge span { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 7.5vw, 5.8rem);
    font-weight: 900;
    color: #fff;
    line-height: 1.08;
    margin-bottom: 0.8rem;
  }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p {
    color: rgba(255,255,255,0.73);
    font-size: 19px; line-height: 1.9;
    max-width: 850px;
    margin-bottom: 1.8rem;
  }
  .hero-actions { display: flex; gap: 24px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 18px 42px; border-radius: 8px;
    font-size: 17px; font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
  .btn-secondary {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.3);
    padding: 18px 42px; border-radius: 8px;
    font-size: 17px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  /* ── SECURITY CARDS ── */
  .hero-cards { position: relative; z-index: 1; }

  /* ── LIVE ELECTION UPDATE ── */
  .live-election-update {
    position: relative; 
    z-index: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 2rem;
    height: fit-content;
    margin-top: 1rem;
  }
  .live-election-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .live-datetime {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .live-date-text {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .live-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }
  .live-dot { 
    width: 8px; 
    height: 8px; 
    background: var(--emerald-light); 
    border-radius: 50%; 
    animation: pulse 1.5s infinite; 
  }
  .election-stat {
    margin-bottom: 1.5rem;
  }
  .election-stat:last-child {
    margin-bottom: 0;
  }
  .stat-name {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .security-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .sec-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
  }
  .sec-card:hover { border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.05); }
  .sec-card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 12px;
  }
  .sec-card h3 { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .sec-card p { font-size: 11px; color: rgba(255,255,255,0.45); line-height: 1.5; }

  /* ── ALGORITHM BADGE ── */
  .algo-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 4px 10px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--gold);
    margin-top: 8px;
  }

  /* ── PAGE CONTAINER ── */
  .page { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }
  .page-sm { max-width: 520px; margin: 0 auto; padding: 3rem 1.5rem; }

  /* ── FORM CARD ── */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }
  .card-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 2rem; line-height: 1.5; }

  /* ── FORM ── */
  .form-group { margin-bottom: 1.25rem; }
  .form-label {
    display: block;
    font-size: 13px; font-weight: 500; color: var(--ink);
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
  .form-input.mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
  .form-hint { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

  .btn-full {
    width: 100%;
    background: var(--ink);
    color: #fff; border: none;
    padding: 13px; border-radius: 8px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-full:hover { background: var(--ink2); transform: translateY(-1px); }
  .btn-full:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
  .btn-gold {
    background: var(--gold); color: var(--ink);
  }
  .btn-gold:hover { background: var(--gold-light); }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 1.5rem 0; color: var(--muted); font-size: 13px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; background: var(--paper); border-radius: 10px; padding: 4px; margin-bottom: 2rem; }
  .tab {
    flex: 1; padding: 9px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; background: transparent; color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  /* ── OTP DISPLAY ── */
  .otp-box {
    background: var(--ink);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    margin: 1rem 0;
  }
  .otp-label { color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .otp-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.5rem; font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.2em;
  }
  .otp-note { color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 8px; }

  /* ── ELECTION CARD ── */
  .election-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem;
    transition: all 0.2s;
    cursor: pointer;
    position: relative; overflow: hidden;
  }
  .election-card:hover { border-color: var(--gold); box-shadow: var(--shadow); transform: translateY(-2px); }
  .election-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--gold);
  }
  .election-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 100px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .status-active { background: rgba(6,95,70,0.1); color: var(--emerald); }
  .status-active .dot { width: 6px; height: 6px; background: var(--emerald-light); border-radius: 50%; animation: pulse 1.5s infinite; }
  .status-upcoming { background: rgba(30,64,175,0.1); color: var(--sky); }
  .status-closed { background: rgba(107,114,128,0.1); color: var(--muted); }

  /* ── BALLOT ── */
  .ballot-header {
    background: var(--ink);
    border-radius: 14px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    position: relative; overflow: hidden;
  }
  .ballot-header::after {
    content: '';
    position: absolute; bottom: -30px; right: -30px;
    width: 120px; height: 120px;
    border: 20px solid rgba(201,168,76,0.15);
    border-radius: 50%;
  }
  .ballot-header h2 {
    font-family: 'Playfair Display', serif;
    color: #fff; font-size: 1.6rem; margin-bottom: 0.5rem;
  }
  .ballot-header p { color: rgba(255,255,255,0.55); font-size: 13px; }
  .ballot-timer {
    display: flex; align-items: center; gap: 8px;
    color: var(--gold); font-size: 13px; font-weight: 500; margin-top: 12px;
  }

  /* ── CANDIDATE CARD ── */
  .candidate-card {
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: #fff;
  }
  .candidate-card:hover { border-color: var(--gold-dark); box-shadow: 0 4px 16px rgba(201,168,76,0.15); }
  .candidate-card.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.05);
    box-shadow: 0 0 0 4px rgba(201,168,76,0.1);
  }
  .candidate-avatar {
    width: 52px; height: 52px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--ink) 0%, var(--ink2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; font-weight: 700; color: var(--gold);
    margin-bottom: 12px;
  }
  .candidate-name { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .candidate-pos { font-size: 12px; color: var(--gold-dark); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .candidate-dept { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .candidate-manifesto { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.6; }
  .selected-check {
    position: absolute; top: 14px; right: 14px;
    width: 24px; height: 24px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--ink);
  }

  /* ── CONFIRM MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(13,17,23,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 2.5rem;
    max-width: 480px; width: 100%;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; color: var(--ink); margin-bottom: 1rem;
  }

  /* ── SUCCESS SCREEN ── */
  .success-screen {
    text-align: center; padding: 4rem 2rem;
    max-width: 500px; margin: 0 auto;
  }
  .success-icon {
    width: 80px; height: 80px;
    background: var(--emerald);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; color: #fff;
    margin: 0 auto 1.5rem;
    box-shadow: 0 0 0 12px rgba(6,95,70,0.12);
  }
  .success-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; color: var(--ink); margin-bottom: 0.75rem;
  }
  .tx-hash {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    word-break: break-all;
    text-align: left;
    margin: 1.25rem 0;
  }
  .tx-hash strong { display: block; font-size: 10px; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

  /* ── ADMIN DASHBOARD ── */
  .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 2rem; }
  .stat-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem;
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: ''; position: absolute; top: -20px; right: -20px;
    width: 80px; height: 80px; border-radius: 50%;
    opacity: 0.07;
  }
  .stat-card.gold::after { background: var(--gold); }
  .stat-card.emerald::after { background: var(--emerald-light); }
  .stat-card.crimson::after { background: var(--crimson); }
  .stat-card.sky::after { background: var(--sky-light); }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-value { font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1; margin-bottom: 4px; }
  .stat-sub { font-size: 12px; color: var(--muted); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 14px;
    background: var(--paper); border-bottom: 2px solid var(--border);
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted);
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--ink); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(201,168,76,0.03); }

  /* ── ANOMALY SCORE ── */
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .score-low { background: var(--emerald-light); }
  .score-mid { background: #f59e0b; }
  .score-high { background: var(--crimson); }
  .flag-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 100px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
  }
  .flag-yes { background: rgba(185,28,28,0.1); color: var(--crimson); }
  .flag-no { background: rgba(6,95,70,0.1); color: var(--emerald); }

  /* ── SECTION HEADER ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; }
  .section-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ── SMALL BUTTON ── */
  .btn-sm {
    padding: 6px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1.5px solid; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-sm.green { border-color: var(--emerald-light); color: var(--emerald); background: rgba(6,95,70,0.07); }
  .btn-sm.green:hover { background: rgba(6,95,70,0.15); }
  .btn-sm.red { border-color: #f87171; color: var(--crimson); background: rgba(185,28,28,0.07); }
  .btn-sm.red:hover { background: rgba(185,28,28,0.15); }
  .btn-sm.blue { border-color: var(--sky-light); color: var(--sky); background: rgba(30,64,175,0.07); }
  .btn-sm.blue:hover { background: rgba(30,64,175,0.15); }

  /* ── RESULTS ── */
  .result-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .result-rank { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); font-weight: 900; width: 32px; }
  .result-bar-wrap { flex: 1; }
  .result-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .result-bar-track { height: 6px; background: var(--paper); border-radius: 3px; overflow: hidden; }
  .result-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 1s ease; }
  .result-votes { font-size: 13px; font-weight: 700; color: var(--ink); min-width: 60px; text-align: right; }

  /* ── ALERT ── */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }

// Simulated SHA-256 display
async function fakeSHA256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  try {
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  } catch(e) {
    return 'sha256:' + Math.random().toString(36).substr(2, 60);
  }
}

// ─── VOTE PAGE ────────────────────────────────────────────────────────────────
function VotePage() {
  const { user, updateUser } = useAuth();
  const [selectedByPosition, setSelectedByPosition] = useState({});
  const [confirming, setConfirming] = useState(false);
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(null);
  const [encryptedPreview, setEncryptedPreview] = useState('');

  const election = MOCK.elections[0];
  const candidates = MOCK.candidates.filter(c=>c.election_id===1);
  
  // Group candidates by position
  const groupedByPosition = candidates.reduce((acc, c) => {
    if(!acc[c.position]) acc[c.position] = [];
    acc[c.position].push(c);
    return acc;
  }, {});

  const handleSelect = (candidate) => { 
    if(!user.has_voted) {
      setSelectedByPosition(prev => ({
        ...prev,
        [candidate.position]: candidate.id === prev[candidate.position] ? null : candidate.id
      }));
    }
  };

  const allPositionsFilled = Object.keys(groupedByPosition).length > 0 && 
                             Object.keys(groupedByPosition).every(pos => selectedByPosition[pos]);

  const handleConfirm = async () => {
    setLoading(true);
    await new Promise(r=>setTimeout(r,400));
    const selectedCandidates = Object.entries(selectedByPosition).map(([pos, candidateId]) => {
      return candidates.find(c => c.id === candidateId);
    });
    const enc = btoa(`candidates=${selectedCandidates.map(c=>c.id).join(',')}|voter_hash=${Math.random().toString(36)}`);
    setEncryptedPreview(enc.substring(0,40)+'...');
    await new Promise(r=>setTimeout(r,800));
    await new Promise(r=>setTimeout(r,500));
    const txHash = await fakeSHA256(`${Object.values(selectedByPosition).join(',')}|${Date.now()}`);
    setDone({ txHash, candidates: selectedCandidates });
    updateUser({ has_voted: true });
    setLoading(false);
    setConfirming(false);
  };

  if(user.has_voted && !done) return (
    <div className="page">
      <div className="success-screen">
        <div className="success-icon">✓</div>
        <h2>Vote Already Cast</h2>
        <p style={{color:'var(--muted)', marginBottom:'1rem'}}>You have already cast your votes in this election. Your votes have been securely recorded.</p>
        <div className="alert alert-info">One-ID-One-Vote principle enforced. Your Student ID hash has been marked as voted.</div>
      </div>
    </div>
  );

  if(done) return (
    <div className="page">
      <div className="success-screen">
        <div className="success-icon">✓</div>
        <h2>Votes Cast Successfully!</h2>
        <p style={{color:'var(--muted)'}}>Your encrypted votes have been recorded. Thank you for participating in the democratic process.</p>
        <div className="tx-hash">
          <strong>Transaction Hash (SHA-256 Integrity Seal)</strong>
          {done.txHash}
        </div>
        <div className="enc-indicator">
          <div className="enc-dot"></div>
          Votes encrypted with RSA-2048 · Anomaly detection: CLEAR · Status: Recorded
        </div>
        <div style={{marginTop:'1rem', padding:'1rem', background:'var(--paper)', borderRadius:'10px', textAlign:'left'}}>
          <div style={{fontSize:'12px', color:'var(--muted)', marginBottom:'8px'}}>You voted for</div>
          {done.candidates.map((candidate, idx) => (
            <div key={idx} style={{marginBottom: idx < done.candidates.length - 1 ? '10px' : '0'}}>
              <div style={{fontWeight:600}}>{candidate.full_name}</div>
              <div style={{fontSize:'12px', color:'var(--gold-dark)'}}>{candidate.position} · {candidate.department}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div className="page">
      <div className="ballot-header">
        <h2>🗳️ {election.title}</h2>
        <p>{election.description}</p>
        <div className="ballot-timer">⏱ Voting closes: {new Date(election.end_time).toLocaleDateString('en-NP', {year:'numeric',month:'long',day:'numeric'})}</div>
      </div>

      {Object.entries(groupedByPosition).map(([position, positionCandidates]) => (
        <div key={position} style={{marginBottom:'2.5rem'}}>
          <div style={{marginBottom:'1.5rem'}}>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'0.75rem'}}>
              <div>
                <div className="section-title">Vote for {position}</div>
                <div className="section-sub">Choose one candidate for this position. Your votes will be RSA-encrypted before submission.</div>
              </div>
              {selectedByPosition[position] && <div className="enc-indicator" style={{padding:'6px 12px'}}>
                <div className="enc-dot"></div> Selected
              </div>}
            </div>
          </div>

          <div className="candidates-grid">
            {positionCandidates.map(c=>(
              <div key={c.id} className={`candidate-card ${selectedByPosition[position]===c.id?'selected':''}`} onClick={()=>handleSelect(c)}>
                {selectedByPosition[position]===c.id && <div className="selected-check">✓</div>}

        </div>
      ))}

      {allPositionsFilled && (

            </p>
            <div style={{background:'var(--paper)', borderRadius:'10px', padding:'14px', marginBottom:'1.5rem'}}>
              {Object.entries(selectedByPosition).map(([position, candidateId]) => {
                const candidate = candidates.find(c => c.id === candidateId);
                return (
                  <div key={position} style={{display:'flex', gap:'14px', alignItems:'center', marginBottom: position !== Object.keys(selectedByPosition)[Object.keys(selectedByPosition).length - 1] ? '12px' : '0', paddingBottom: position !== Object.keys(selectedByPosition)[Object.keys(selectedByPosition).length - 1] ? '12px' : '0', borderBottom: position !== Object.keys(selectedByPosition)[Object.keys(selectedByPosition).length - 1] ? '1px solid rgba(0,0,0,0.1)' : 'none'}}>
                    <div className="candidate-avatar" style={{width:'44px',height:'44px',fontSize:'1.1rem'}}>{candidate.full_name[0]}</div>
                    <div>
                      <div style={{fontWeight:600}}>{candidate.full_name}</div>
                      <div style={{fontSize:'12px', color:'var(--gold-dark)'}}>{candidate.position} · {candidate.department}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            {encryptedPreview && <div style={{fontFamily:'JetBrains Mono',fontSize:'10px',background:'#f0fdf4',border:'1px solid #a7f3d0',borderRadius:'6px',padding:'8px',marginBottom:'1rem',color:'var(--emerald)',wordBreak:'break-all'}}>
              🔒 RSA Encrypted: {encryptedPreview}
            </div>}
            <div className="enc-indicator" style={{marginBottom:'1.5rem'}}>
              <div className="enc-dot"></div> Votes will be encrypted with RSA-2048 before transmission
            </div>
            <div style={{display:'flex', gap:'10px'}}>
              <button className="btn-full" onClick={handleConfirm} disabled={loading}>
                {loading ? <><div className="spinner"></div> Encrypting & Submitting...</> : '✓ Cast My Votes'}
              </button>
              <button className="btn-full" style={{background:'transparent',color:'var(--ink)',border:'1.5px solid var(--border)'}} onClick={()=>setConfirming(false)} disabled={loading}>
                Cancel

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

          </div>
          <div>
            <div style={{fontSize:'11px',color:'rgba(255,255,255,0.4)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.5px'}}>Score Formula</div>
            <div style={{fontFamily:'JetBrains Mono',fontSize:'13px',color:'var(--gold)'}}>s(x,n) = 2^(-E(h(x))/c(n))</div>

          <div>
            <div style={{fontSize:'11px',color:'rgba(255,255,255,0.4)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.5px'}}>Threshold</div>

                <tr key={log.id}>
                  <td>

                  <td><span style={{fontFamily:'JetBrains Mono',fontSize:'12px'}}>{log.ip_address}</span></td>
                  <td>

                      </div>

                  </td>

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('home');

  const authValue = {
    user,
    login: (token, userData) => {
      setUser(userData);
      setPage(userData.role === 'admin' ? 'dashboard' : 'vote');
    },
    logout: () => {
      setUser(null);
      setPage('home');
    },
    updateUser: (updates) => setUser(u => ({...u, ...updates}))
  };

  const renderPage = () => {
    if (!user) {
      if (page === 'register') return <RegisterPage setPage={setPage} />;
      if (page === 'login') return <LoginPage setPage={setPage} />;
      return <LandingPage setPage={setPage} />;
    }
    if (user.role === 'voter') return <VotePage />;
    if (page === 'dashboard') return <AdminDashboard />;
    if (page === 'elections') return <AdminElections />;
    if (page === 'voters') return <AdminVoters />;
    if (page === 'audit') return <AdminAuditLogs />;
    return <AdminDashboard />;
  };

  return (
    <AuthCtx.Provider value={authValue}>
      <div className="app">
        <NavBar page={page} setPage={setPage} />
        <main>{renderPage()}</main>
        <footer style={{background:'var(--ink)',borderTop:'1px solid rgba(255,255,255,0.06)',padding:'1.25rem 2rem',display:'flex',alignItems:'center',justifyContent:'center',flexWrap:'wrap',gap:'8px',flexDirection:'column'}}>
          <div style={{color:'rgba(255,255,255,0.35)',fontSize:'12px'}}>
