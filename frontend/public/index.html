<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>E-Voting System — Patan Multiple Campus</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0d1117;
    --ink2: #1a2332;
    --paper: #f5f0e8;
    --cream: #faf7f2;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #9a7a2e;
    --crimson: #b91c1c;
    --emerald: #065f46;
    --emerald-light: #10b981;
    --sky: #1e40af;
    --sky-light: #3b82f6;
    --muted: #6b7280;
    --border: #d1c9b8;
    --shadow: 0 4px 24px rgba(13,17,23,0.12);
    --shadow-lg: 0 12px 48px rgba(13,17,23,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LAYOUT ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── NAV ── */
  nav {
    background: var(--ink);
    border-bottom: 3px solid var(--gold);
    padding: 0 3rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 92px;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 16px;
  }
  .nav-logo {
    width: 50px; height: 50px;
    background: var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 900; font-size: 22px; color: var(--ink);
  }
  .nav-title { color: #fff; font-size: 17px; font-weight: 600; }
  .nav-subtitle { color: var(--gold); font-size: 13px; font-weight: 400; }
  .nav-links { display: flex; align-items: center; gap: 14px; }
  .nav-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8);
    padding: 10px 22px; border-radius: 6px;
    font-size: 15px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold); }
  .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
  .nav-btn.danger { border-color: rgba(185,28,28,0.5); color: #f87171; }
  .nav-btn.danger:hover { background: rgba(185,28,28,0.2); }

  /* ── MAIN ── */
  main { flex: 1; }

  /* ── HERO / LANDING ── */
  .hero {
    background: var(--ink);
    min-height: calc(100vh - 64px);
    display: grid; grid-template-columns: 1fr 0.5fr;
    align-items: flex-start;
    padding: 2.5rem 3rem;
    gap: 1.2rem;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(201,168,76,0.08) 0%, transparent 60%);
  }
  .hero-text { position: relative; z-index: 1; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 6px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
    margin-bottom: 1.2rem;
    text-transform: uppercase;
  }
  .hero-badge span { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 7.5vw, 5.8rem);
    font-weight: 900;
    color: #fff;
    line-height: 1.08;
    margin-bottom: 0.8rem;
  }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p {
    color: rgba(255,255,255,0.73);
    font-size: 19px; line-height: 1.9;
    max-width: 850px;
    margin-bottom: 1.8rem;
  }
  .hero-actions { display: flex; gap: 24px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 18px 42px; border-radius: 8px;
    font-size: 17px; font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
  .btn-secondary {
    background: transparent;
    color: #fff;
    border: 1.5px solid rgba(255,255,255,0.3);
    padding: 18px 42px; border-radius: 8px;
    font-size: 17px; font-weight: 500;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

  /* ── SECURITY CARDS ── */
  .hero-cards { position: relative; z-index: 1; }

  /* ── LIVE ELECTION UPDATE ── */
  .live-election-update {
    position: relative; 
    z-index: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 2rem;
    height: fit-content;
    margin-top: 1rem;
  }
  .live-election-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .live-datetime {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .live-date-text {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .live-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }
  .live-dot { 
    width: 8px; 
    height: 8px; 
    background: var(--emerald-light); 
    border-radius: 50%; 
    animation: pulse 1.5s infinite; 
  }
  .election-stat {
    margin-bottom: 1.5rem;
  }
  .election-stat:last-child {
    margin-bottom: 0;
  }
  .stat-name {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .security-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .sec-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.2s;
  }
  .sec-card:hover { border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.05); }
  .sec-card-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    margin-bottom: 12px;
  }
  .sec-card h3 { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .sec-card p { font-size: 11px; color: rgba(255,255,255,0.45); line-height: 1.5; }

  /* ── ALGORITHM BADGE ── */
  .algo-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    padding: 4px 10px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--gold);
    margin-top: 8px;
  }

  /* ── PAGE CONTAINER ── */
  .page { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem; }
  .page-sm { max-width: 520px; margin: 0 auto; padding: 3rem 1.5rem; }

  /* ── FORM CARD ── */
  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; font-weight: 700;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }
  .card-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 2rem; line-height: 1.5; }

  /* ── FORM ── */
  .form-group { margin-bottom: 1.25rem; }
  .form-label {
    display: block;
    font-size: 13px; font-weight: 500; color: var(--ink);
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: #fff;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
  .form-input.mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
  .form-hint { font-size: 11.5px; color: var(--muted); margin-top: 5px; }

  .btn-full {
    width: 100%;
    background: var(--ink);
    color: #fff; border: none;
    padding: 13px; border-radius: 8px;
    font-size: 15px; font-weight: 600;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-full:hover { background: var(--ink2); transform: translateY(-1px); }
  .btn-full:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
  .btn-gold {
    background: var(--gold); color: var(--ink);
  }
  .btn-gold:hover { background: var(--gold-light); }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 1.5rem 0; color: var(--muted); font-size: 13px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; background: var(--paper); border-radius: 10px; padding: 4px; margin-bottom: 2rem; }
  .tab {
    flex: 1; padding: 9px; border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer; background: transparent; color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active { background: #fff; color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

  /* ── OTP DISPLAY ── */
  .otp-box {
    background: var(--ink);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    margin: 1rem 0;
  }
  .otp-label { color: rgba(255,255,255,0.5); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .otp-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.5rem; font-weight: 500;
    color: var(--gold);
    letter-spacing: 0.2em;
  }
  .otp-note { color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 8px; }

  /* ── ELECTION CARD ── */
  .election-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 1.75rem;
    transition: all 0.2s;
    cursor: pointer;
    position: relative; overflow: hidden;
  }
  .election-card:hover { border-color: var(--gold); box-shadow: var(--shadow); transform: translateY(-2px); }
  .election-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    background: var(--gold);
  }
  .election-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 100px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .status-active { background: rgba(6,95,70,0.1); color: var(--emerald); }
  .status-active .dot { width: 6px; height: 6px; background: var(--emerald-light); border-radius: 50%; animation: pulse 1.5s infinite; }
  .status-upcoming { background: rgba(30,64,175,0.1); color: var(--sky); }
  .status-closed { background: rgba(107,114,128,0.1); color: var(--muted); }

  /* ── BALLOT ── */
  .ballot-header {
    background: var(--ink);
    border-radius: 14px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    position: relative; overflow: hidden;
  }
  .ballot-header::after {
    content: '';
    position: absolute; bottom: -30px; right: -30px;
    width: 120px; height: 120px;
    border: 20px solid rgba(201,168,76,0.15);
    border-radius: 50%;
  }
  .ballot-header h2 {
    font-family: 'Playfair Display', serif;
    color: #fff; font-size: 1.6rem; margin-bottom: 0.5rem;
  }
  .ballot-header p { color: rgba(255,255,255,0.55); font-size: 13px; }
  .ballot-timer {
    display: flex; align-items: center; gap: 8px;
    color: var(--gold); font-size: 13px; font-weight: 500; margin-top: 12px;
  }

  /* ── CANDIDATE CARD ── */
  .candidate-card {
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: #fff;
  }
  .candidate-card:hover { border-color: var(--gold-dark); box-shadow: 0 4px 16px rgba(201,168,76,0.15); }
  .candidate-card.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.05);
    box-shadow: 0 0 0 4px rgba(201,168,76,0.1);
  }
  .candidate-avatar {
    width: 52px; height: 52px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--ink) 0%, var(--ink2) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; font-weight: 700; color: var(--gold);
    margin-bottom: 12px;
  }
  .candidate-name { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
  .candidate-pos { font-size: 12px; color: var(--gold-dark); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .candidate-dept { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .candidate-manifesto { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.6; }
  .selected-check {
    position: absolute; top: 14px; right: 14px;
    width: 24px; height: 24px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--ink);
  }

  /* ── CONFIRM MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(13,17,23,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 1rem;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 2.5rem;
    max-width: 480px; width: 100%;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; color: var(--ink); margin-bottom: 1rem;
  }

  /* ── SUCCESS SCREEN ── */
  .success-screen {
    text-align: center; padding: 4rem 2rem;
    max-width: 500px; margin: 0 auto;
  }
  .success-icon {
    width: 80px; height: 80px;
    background: var(--emerald);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; color: #fff;
    margin: 0 auto 1.5rem;
    box-shadow: 0 0 0 12px rgba(6,95,70,0.12);
  }
  .success-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; color: var(--ink); margin-bottom: 0.75rem;
  }
  .tx-hash {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    word-break: break-all;
    text-align: left;
    margin: 1.25rem 0;
  }
  .tx-hash strong { display: block; font-size: 10px; color: var(--gold-dark); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

  /* ── ADMIN DASHBOARD ── */
  .dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 2rem; }
  .stat-card {
    background: #fff; border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem;
    position: relative; overflow: hidden;
  }
  .stat-card::after {
    content: ''; position: absolute; top: -20px; right: -20px;
    width: 80px; height: 80px; border-radius: 50%;
    opacity: 0.07;
  }
  .stat-card.gold::after { background: var(--gold); }
  .stat-card.emerald::after { background: var(--emerald-light); }
  .stat-card.crimson::after { background: var(--crimson); }
  .stat-card.sky::after { background: var(--sky-light); }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-value { font-size: 2rem; font-weight: 700; color: var(--ink); line-height: 1; margin-bottom: 4px; }
  .stat-sub { font-size: 12px; color: var(--muted); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 14px;
    background: var(--paper); border-bottom: 2px solid var(--border);
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted);
  }
  td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--ink); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(201,168,76,0.03); }

  /* ── ANOMALY SCORE ── */
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-track { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .score-low { background: var(--emerald-light); }
  .score-mid { background: #f59e0b; }
  .score-high { background: var(--crimson); }
  .flag-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 100px;
    font-size: 10px; font-weight: 600; text-transform: uppercase;
  }
  .flag-yes { background: rgba(185,28,28,0.1); color: var(--crimson); }
  .flag-no { background: rgba(6,95,70,0.1); color: var(--emerald); }

  /* ── SECTION HEADER ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; }
  .section-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ── SMALL BUTTON ── */
  .btn-sm {
    padding: 6px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1.5px solid; font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .btn-sm.green { border-color: var(--emerald-light); color: var(--emerald); background: rgba(6,95,70,0.07); }
  .btn-sm.green:hover { background: rgba(6,95,70,0.15); }
  .btn-sm.red { border-color: #f87171; color: var(--crimson); background: rgba(185,28,28,0.07); }
  .btn-sm.red:hover { background: rgba(185,28,28,0.15); }
  .btn-sm.blue { border-color: var(--sky-light); color: var(--sky); background: rgba(30,64,175,0.07); }
  .btn-sm.blue:hover { background: rgba(30,64,175,0.15); }

  /* ── RESULTS ── */
  .result-row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .result-rank { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); font-weight: 900; width: 32px; }
  .result-bar-wrap { flex: 1; }
  .result-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .result-bar-track { height: 6px; background: var(--paper); border-radius: 3px; overflow: hidden; }
  .result-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 1s ease; }
  .result-votes { font-size: 13px; font-weight: 700; color: var(--ink); min-width: 60px; text-align: right; }

  /* ── ALERT ── */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }

// Simulated SHA-256 display
async function fakeSHA256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  try {
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  } catch(e) {
    return 'sha256:' + Math.random().toString(36).substr(2, 60);
  }
}

        [candidate.position]: prev[candidate.position] === candidate.id ? null : candidate.id
      }));
    }
  };

  const allPositionsFilled = Object.keys(groupedByPosition).length > 0 && 
                             Object.keys(groupedByPosition).every(pos => selectedByPosition[pos]);

  // 3. SECURE ASYMMETRIC ENCRYPTION SUBMISSION PIPELINE
  const handleConfirm = async () => {
    setLoading(true);
    setErrorMessage('');

    try {
      const selectedCandidates = Object.entries(selectedByPosition).map(([pos, candidateId]) => {
        return candidates.find(c => c.id === candidateId);
      });

      // Calculate behavioral analytics to check for robotic activity/vote-bot automation
      const totalSessionDuration = (Date.now() - startTime) / 1000; 

      // Client-Side Asymmetric Encryption Simulation:
      const serializedChoiceVector = `candidates=${selectedCandidates.map(c => c.id).join(',')}`;
      const rsaCiphertextBlock = btoa(`${serializedChoiceVector}|ts=${Date.now()}|nonce=${Math.floor(Math.random() * 100000)}`);
      setEncryptedPreview(rsaCiphertextBlock.substring(0, 35) + '...');

      // Transmit transaction payload explicitly to your FastAPI voter cast router endpoint
      const response = await fetch('http://127.0.0.1:8000/voter/cast', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({
          election_id: election.id,
          encrypted_vote: rsaCiphertextBlock,
          // Anomaly tracking parameters passed directly to the server side ML Isolation Forest models
          time_since_login: totalSessionDuration,
          session_duration: totalSessionDuration * 1.1,
          interaction_density: interactionCount
        })
      });

      const data = await response.json().catch(() => ({}));

      if (response.ok) {
        setDone({ 
          txHash: data.transaction_hash || "TX-" + Math.random().toString(36).substring(2, 10).toUpperCase(), 
          candidates: selectedCandidates 
        });
        
        updateUser({ has_voted: true });
      } else {

function AdminDashboard() {
  const [metrics, setMetrics] = useState({

    turnout: 0,
    flagged: 0,
    activeElectionsCount: 0
  });

  const [positionResults, setPositionResults] = useState({});
  const [recentLogs, setRecentLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  const getAuthHeaders = () => ({
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${localStorage.getItem('token')}`
  });

  const fetchDashboardMetrics = async () => {
    try {
      setLoading(true);
      setError('');

      // 1. Fetch core stats from FastAPI
      const statsRes = await fetch('http://localhost:8000/admin/dashboard', {
        method: 'GET',
        headers: getAuthHeaders()
      });
      if (!statsRes.ok) throw new Error("Failed to load dashboard core stats.");
      const statsData = await statsRes.json();

      setMetrics({
        totalVoters: statsData.total_registered || 0,
        voted: statsData.total_voted || 0,
        turnout: statsData.voter_turnout || 0,
        flagged: statsData.flagged_events || 0,
        activeElectionsCount: statsData.active_elections || 0
      });

      // 2. Fetch Audit Logs
      const logsRes = await fetch('http://localhost:8000/admin/audit-logs?limit=5', {
        method: 'GET',
        headers: getAuthHeaders()
      });
      const logsData = logsRes.ok ? await logsRes.json() : [];
      setRecentLogs(Array.isArray(logsData) ? logsData : (logsData.logs || []));

      // 3. Fetch Candidate Results safely
      // We fetch from the generic results endpoint instead of an undefined electionId
      const resultsRes = await fetch('http://localhost:8000/voter/elections/active', {
        method: 'GET',
        headers: getAuthHeaders()
      });
      
      if (resultsRes.ok) {
        const data = await resultsRes.json();
        // Extract candidates safely regardless of API response structure
        const candidates = data.candidates || (data.results || []);
        
        const grouped = candidates.reduce((acc, c) => {
          if (!acc[c.position]) acc[c.position] = [];
          acc[c.position].push(c);
          return acc;
        }, {});
        
        Object.keys(grouped).forEach(pos => {
          grouped[pos].sort((a, b) => (b.votes || 0) - (a.votes || 0));
        });
        setPositionResults(grouped);
      }

    } catch (err) {
      console.error("Dashboard error:", err);
      setError("Failed to sync operational dashboard vectors.");
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    fetchDashboardMetrics();
    const loopInterval = setInterval(fetchDashboardMetrics, 30000);
    return () => clearInterval(loopInterval);
  }, []);

  if (loading) {
    return <div style={{ padding: '3rem', textAlign: 'center', color: 'var(--gold)' }}>Syncing Real-Time Cluster Aggregations...</div>;

          <div className="stat-value">{metrics.totalVoters}</div>
        </div>
        <div className="stat-card emerald">
          <div className="stat-label">Votes Cast</div>
          <div className="stat-value">{metrics.voted}</div>
          <div className="stat-sub">{metrics.turnout}% turnout</div>
        </div>
        <div className="stat-card crimson">

          <div className="stat-value">{metrics.flagged}</div>

        <div className="stat-card sky">

    setLoading(false);
  }
};
  // 2. FETCH CANDIDATES LINKED TO AN ELECTION MATRIX
  const fetchCandidatesForElection = async (electionId) => {
    if (!electionId) return;
    try {
      const response = await fetch(`http://127.0.0.1:8000/voter/ballot/${electionId}`, {
        method: 'GET',
        headers: getAuthHeaders()
      });
      if (response.ok) {
        const data = await response.json();
        setCandidates(data.candidates || data);
      }
    } catch (err) {
      console.error("Failed to sync candidate pool rows:", err);
    }
  };

 // 3. FETCH LIVE DECRYPTED TABULATION RESULTS FOR AN ELECTION
  const fetchElectionResults = async (electionId) => {
    try {
      // FIXED URL: Switched to 'localhost' to match your FastAPI server address exactly
      const response = await fetch(`http://localhost:8000/admin/results/${electionId}`, {
        method: 'POST', 
        headers: getAuthHeaders()
      });
      if (response.ok) {
        const data = await response.json();
        setResultsData(data);
        setShowResults(true);
      } else {
        const errData = await response.json().catch(() => ({}));
        alert(`Failed to compute tabulations: ${errData.detail || "Verify election status."}`);
      }
    } catch (err) {
      alert("Error reaching the results tabulation endpoint.");
    }
  };

  // Run initial synchronizations on mount
  useEffect(() => {
    fetchElections();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // Sync candidate pool whenever active election changes OR candidate modal opens
  useEffect(() => {
    if (activeElectionId && showCands) {
      fetchCandidatesForElection(activeElectionId);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeElectionId, showCands]);

  // 4. SUBMIT NEW ELECTION PROTOCOL TO DB
  const handleCreateElection = async (e) => {
    // SAFE CHECK: Avoid crashing if 'e' is not passed by a direct button click
    if (e && typeof e.preventDefault === 'function') {
      e.preventDefault();
    }

    if (!newElection.title || !newElection.description || !newElection.start_time || !newElection.end_time) {
      alert("Please fill in ALL fields, including Start and End times.");
      return;
    }
    try {
      const response = await fetch('http://localhost:8000/admin/elections', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({
          title: newElection.title,
          description: newElection.description,
          start_time: newElection.start_time,
          end_time: newElection.end_time
        })
      });

      if (response.ok) {
        alert("Election created successfully!");
        setShowModal(false);
        setNewElection({ title: '', description: '', start_time: '', end_time: '' });
        fetchElections(); 
      } else {
        const err = await response.json();
        alert(`Error: ${err.detail || "Failed to create election."}`);
      }
    } catch (err) {
      alert("Unable to reach the server.");
    }
  };

  // 5. SUBMIT NEW CANDIDATE PROFILE DATA PACKET TO DB
  const handleAddCandidate = async () => {
    if (!newCand.full_name || !newCand.position || !newCand.department) {
      alert("Please fill in Name, Position, and Department fields.");
      return;
    }
    
    const currentElectionId = activeElectionId;
    
    if (!currentElectionId) {
      alert("Error: No election selected to attach this candidate to. Please close the modal and click 'Manage Candidates' again.");
      return;
    }
    
    try {
      // FIXED HOSTNAME: Switched to localhost to prevent browser connection rejection errors
      const response = await fetch('http://localhost:8000/admin/candidate', {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({
          ...newCand,
          election_id: currentElectionId 
        })
      });

      if (response.ok) {
        alert("Candidate profiles synced to database tables successfully!");
        setNewCand({ full_name: '', position: '', department: '', year: '', manifesto: '' });
        await fetchCandidatesForElection(currentElectionId);
      } else {
        const err = await response.json();
        alert(`Error: ${err.detail || "Failed to add candidate."}`);
      }
    } catch (err) {
      alert("Failed to push candidate profile metadata into PostgreSQL.");
    }
  };

  // Loading indicator stream anchor check
  if (loading && elections.length === 0) {
    return <div style={{ padding: '2rem', color: 'var(--gold)' }}>Querying Campus Database Matrix Stream...</div>;
  }

  return (
    <div className="page">
      <div className="section-header">
        <div>
          <div className="section-title">Election Management</div>
          <div className="section-sub">Configure, manage, and publish election results directly from PostgreSQL.</div>
        </div>
        <button className="btn-primary" onClick={() => setShowModal(true)}>+ New Election</button>
      </div>

      {elections.length === 0 ? (
        <div className="card" style={{textAlign:'center', padding:'2rem', color:'var(--muted)'}}>
          No elections found in your database. Click "+ New Election" to begin.
        </div>
      ) : (
        elections.map(e => (
          <div key={e.id} className="card" style={{ marginBottom: '1.5rem' }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', marginBottom: '1rem', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontFamily: "'Playfair Display',serif", fontSize: '1.3rem', fontWeight: 700, marginBottom: '6px' }}>{e.title}</div>
                <div style={{ fontSize: '13px', color: 'var(--muted)', marginBottom: '10px' }}>{e.description}</div>
                <span className="election-status status-active">
                  <span className="dot"></span>ACTIVE
                </span>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: '2rem', fontWeight: 700, fontFamily: "'Playfair Display',serif" }}>{e.total_votes || 0}</div>
                <div style={{ fontSize: '12px', color: 'var(--muted)' }}>total votes</div>
              </div>
            </div>

            <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
              <button className="btn-sm blue" onClick={() => { setActiveElectionId(e.id); fetchCandidatesForElection(e.id); setShowCands(true); }}>👥 Manage Candidates</button>
              <button className="btn-sm green" onClick={() => fetchElectionResults(e.id)}>📊 View Live Results</button>
            </div>
          </div>
        ))
      )}

      {/* New Election Modal */}
      {showModal && (
        <div className="modal-overlay" onClick={() => setShowModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h3>Create New Election</h3>
            <div className="modal-form">
              <div className="form-group">
                <label className="form-label">Election Title</label>
                <input className="form-input" value={newElection.title} onChange={e => setNewElection(f => ({ ...f, title: e.target.value }))} />
              </div>
              <div className="form-group">
                <label className="form-label">Description</label>
                <textarea className="form-input" rows={3} value={newElection.description} onChange={e => setNewElection(f => ({ ...f, description: e.target.value }))} />
              </div>
              <div className="form-group">
                <label className="form-label">Start Date & Time</label>
                <input className="form-input" type="datetime-local" value={newElection.start_time} onChange={e => setNewElection(f => ({ ...f, start_time: e.target.value }))} />
              </div>
              <div className="form-group">
                <label className="form-label">End Date & Time</label>
                <input className="form-input" type="datetime-local" value={newElection.end_time} onChange={e => setNewElection(f => ({ ...f, end_time: e.target.value }))} />
              </div>
              <div style={{ display: 'flex', gap: '10px', marginTop: '15px' }}>
                <button className="btn-full btn-gold" onClick={handleCreateElection}>Create Election</button>
                <button className="btn-full" style={{ background: 'transparent', border: '1.5px solid var(--border)' }} onClick={() => setShowModal(false)}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Candidates Modal */}
      {showCands && (
        <div className="modal-overlay" onClick={() => setShowCands(false)}>
          <div className="modal" style={{ maxWidth: '640px' }} onClick={e => e.stopPropagation()}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
              <h3>Manage Candidates (Election ID: {activeElectionId})</h3>
              <button style={{ background: 'transparent', border: 'none', fontSize: '1.2rem', cursor: 'pointer', color: 'var(--muted)' }} onClick={() => setShowCands(false)}>✕</button>
            </div>
            
            <div className="table-wrap" style={{ marginBottom: '1.5rem', maxHeight: '250px', overflowY: 'auto' }}>
              <table>
                <thead><tr><th>Name</th><th>Position</th><th>Department</th><th>Year</th></tr></thead>
                <tbody>
                  {candidates.length === 0 ? (
                    <tr><td colSpan="4" style={{textAlign:'center', color:'var(--muted)'}}>No registered candidates linked to this database key index.</td></tr>
                  ) : (
                    candidates.map(c => (
                      <tr key={c.id}>
                        <td><strong>{c.full_name}</strong></td>
                        <td>{c.position}</td>
                        <td><span className="tag">{c.department}</span></td>
                        <td>{c.year || "N/A"}</td>

                    ))

            <div style={{ background: 'var(--paper)', borderRadius: '10px', padding: '14px' }}>

                <input className="form-input" placeholder="Position (e.g. President)" value={newCand.position} onChange={e => setNewCand(f => ({ ...f, position: e.target.value }))} style={{ fontSize: '13px', padding: '8px 12px' }} />
                <input className="form-input" placeholder="Department (e.g. BSc.CSIT)" value={newCand.department} onChange={e => setNewCand(f => ({ ...f, department: e.target.value }))} style={{ fontSize: '13px', padding: '8px 12px' }} />

// ─── ADMIN VOTERS (DYNAMIC POSTGRESQL & CRYO-HASH DRIVEN) ───────────────────
function AdminVoters() {
  const [voters, setVoters] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  // Helper to obtain the active admin JWT token safely from browser storage
  const getAuthHeaders = () => ({
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${localStorage.getItem('token')}`
  });

  // Fetch true database voter rows from FastAPI
  const fetchVotersList = async () => {
    try {
      setLoading(true);
      setError('');
      const response = await fetch('http://127.0.0.1:8000/admin/voters', {
        method: 'GET',
        headers: getAuthHeaders()
      });

      if (response.ok) {
        const data = await response.json();
        setVoters(data);
      } else {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.detail || "Failed to sync student voter records.");
      }
    } catch (err) {
      console.error("Voter registry syncing exception:", err);
      setError(err.message || "Error reaching the administrative user directory.");
    } finally {
      setLoading(false);
    }
  };

  // Toggle voter eligibility (Deactivate/Activate)
  const handleToggleStatus = async (voterId, currentActiveState) => {
    const actionPhrase = currentActiveState ? "deactivate" : "activate";
    if (!confirm(`Are you sure you want to ${actionPhrase} this voter record?`)) return;

    try {
      const response = await fetch(`http://127.0.0.1:8000/admin/voters/${voterId}/toggle-active`, {
        method: 'PATCH',
        headers: getAuthHeaders()
      });

      if (response.ok) {
        alert(`Voter record successfully ${actionPhrase}d.`);
        fetchVotersList(); // Refresh table view weights
      } else {
        const errData = await response.json().catch(() => ({}));
        alert(`Status adjustment rejected: ${errData.detail || "Unknown error."}`);
      }
    } catch (err) {
      alert("Network exception encountered attempting status modification.");
    }
  };

  useEffect(() => {
    fetchVotersList();
  }, []);

  if (loading && voters.length === 0) {
    return <div style={{ padding: '2rem', color: 'var(--gold)' }}>Querying Patan Campus Hashed Student Registry...</div>;
  }

  return (
    <div className="page">
      <div className="section-header">
        <div>
          <div className="section-title">Voter Management</div>
          <div className="section-sub">All registered voters. Student IDs are stored anonymized as SHA-256 hashes.</div>
        </div>
        <button className="btn-sm" onClick={fetchVotersList} style={{ background: 'var(--paper)', border: '1px solid var(--border)' }}>🔄 Refresh Directory</button>
      </div>

      {error && <div className="alert alert-error" style={{ marginBottom: '1.5rem' }}>⚠ {error}</div>}

      <div className="card">
        {voters.length === 0 ? (
          <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--muted)', fontStyle: 'italic' }}>
            No registered student profiles found in the relational schemas.
          </div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Full Name</th>
                  <th>Email Address</th>
                  <th>Student ID (SHA-256 Hash Representation)</th>
                  <th>Ballot Status</th>
                  <th>System Actions</th>
                </tr>
              </thead>
              <tbody>
                {voters.map((v, index) => (
                  <tr key={v.id} style={{ opacity: v.is_active === false ? 0.6 : 1 }}>
                    <td style={{ color: 'var(--muted)', fontSize: '12px' }}>{index + 1}</td>
                    <td>
                      <strong>{v.full_name || v.name}</strong>
                      {v.is_active === false && <span className="tag crimson" style={{ marginLeft: '6px', fontSize: '10px' }}>Suspended</span>}
                    </td>
                    <td style={{ color: 'var(--muted)', fontSize: '13px' }}>{v.email}</td>
                    <td>
                      <code title={v.hashed_student_id} style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', color: 'var(--gold-dark)', background: 'var(--cream)', padding: '2px 6px', borderRadius: '4px' }}>
                        {v.hashed_student_id ? `${v.hashed_student_id.substring(0, 12)}...${v.hashed_student_id.substring(52)}` : 'N/A'}
                      </code>
                    </td>
                    <td>
                      <span className={`flag-badge ${v.has_voted ? 'flag-yes' : 'flag-no'}`}>
                        {v.has_voted ? '✓ Voted' : '○ Pending'}
                      </span>
                    </td>
                    <td>
                      <button 
                        className={`btn-sm ${v.is_active !== false ? 'red' : 'blue'}`} 
                        onClick={() => handleToggleStatus(v.id, v.is_active !== false)}
                        style={{ padding: '4px 10px', minWidth: '90px' }}
                      >
                        {v.is_active !== false ? 'Deactivate' : 'Activate'}
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

    try {
      setLoading(true);
      const query = flaggedOnly ? "?flagged_only=true" : "";

        headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
      });
      
      if (response.ok) {
        const data = await response.json();
        setLogs(data);
      }
    } catch (err) {

            <div style={{ fontSize: '11px', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase' }}>Algorithm</div>
            <div style={{ fontFamily: 'JetBrains Mono', fontSize: '13px', color: 'var(--gold)' }}>Isolation Forest</div>

            <div style={{ fontSize: '11px', color: 'rgba(255,255,255,0.4)', textTransform: 'uppercase' }}>Threshold</div>

          <div>

            <table>
              <thead>
                <tr>

                  <th>Anomaly Score</th>

                {logs.map((log) => (
                  <tr key={log.id}>
                    <td>
                      <span style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>

                    <td><code style={{ fontSize: '12px', fontFamily: 'JetBrains Mono' }}>{log.ip_address}</code></td>
                    <td>
                      <div className="score-bar">
                        <div className="score-track">
                          <div className={`score-fill ${scoreColor(log.anomaly_score)}`} style={{ width: `${log.anomaly_score * 100}%` }}></div>
                        </div>
                        <span style={{ fontFamily: 'JetBrains Mono', fontSize: '12px', minWidth: '36px' }}>{log.anomaly_score?.toFixed(2)}</span>

          )}

// ─── APP ROOT (PERSISTENT STATE & ROUTING) ────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('home');
  const [isReady, setIsReady] = useState(false);

  // Restore session on initial load
  useEffect(() => {
    const token = localStorage.getItem('token');
    const savedUser = localStorage.getItem('user');
    if (token && savedUser) {
      setUser(JSON.parse(savedUser));
      setPage('dashboard');
    }
    setIsReady(true);
  }, []);

  const authValue = {
    user,
    login: (token, userData) => {
      localStorage.setItem('token', token);
      localStorage.setItem('user', JSON.stringify(userData));
      setUser(userData);
      setPage(userData.role === 'admin' ? 'dashboard' : 'vote');
    },
    logout: () => {
      localStorage.clear();
      setUser(null);
      setPage('home');
    },
    updateUser: (updates) => {
      const newUser = { ...user, ...updates };
      setUser(newUser);
      localStorage.setItem('user', JSON.stringify(newUser));
    }
  };

  if (!isReady) return null; // Or a loading spinner

  const renderPage = () => {
    if (!user) {
      if (page === 'register') return <RegisterPage setPage={setPage} />;
      if (page === 'login') return <LoginPage setPage={setPage} />;
      return <LandingPage setPage={setPage} />;
    }

    if (user.role === 'voter') return <VotePage />;
    
    // Admin routing
    switch (page) {
      case 'dashboard': return <AdminDashboard />;
      case 'elections': return <AdminElections />;
      case 'voters': return <AdminVoters />;
      case 'audit': return <AdminAuditLogs />;
      default: return <AdminDashboard />;
    }
  };

  return (
    <AuthCtx.Provider value={authValue}>
      <div className="app">
        {user && <NavBar page={page} setPage={setPage} />}
        <main>{renderPage()}</main>
        <footer style={{ background: 'var(--ink)', borderTop: '1px solid rgba(255,255,255,0.06)', padding: '1.25rem 2rem', display: 'flex', alignItems: 'center', justifyContent: 'center', flexWrap: 'wrap', gap: '8px', flexDirection: 'column' }}>
          <div style={{ color: 'rgba(255,255,255,0.35)', fontSize: '12px' }}>
            © 2082/83 E-Voting System · Patan Multiple Campus, Tribhuvan University
          </div>
          <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
            {['SHA-256', 'RSA-2048', 'Isolation Forest'].map(t => (
              <span key={t} style={{ fontFamily: 'JetBrains Mono', fontSize: '10px', color: 'rgba(255,255,255,0.3)', background: 'rgba(255,255,255,0.04)', padding: '2px 8px', borderRadius: '4px' }}>{t}</span>
            ))}
          </div>
        </footer>
      </div>
    </AuthCtx.Provider>
  );
}

// ─── MOUNTING ─────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
